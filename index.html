<!DOCTYPE html>
<html lang="zh">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<meta http-equiv="X-UA-Compatible" content="ie=edge" />
	<title>index</title>
	<style type="text/css">
		* {
			box-sizing: border-box;
		}
		
		html, body {
			padding: 0;
			margin: 0;
		}
		
		html {
			overflow: hidden;
		}
		
		body {
			width: 100vw;
			height: 100vh;
			perspective: 100px;
			transform-style: preserve-3d;
			overflow-y: auto;
		}
		
		.main {
			display: flex;
			flex-direction: column;
			align-content: center;
			justify-content: center;
		}
		
		.list-item {
			position: relative;
			display: flex;
			flex-direction: column;
			align-content: center;
			justify-content: center;
			width: 100%;
			height: 45vh;
			overflow: hidden;
		}
		
		.item-image {
			width: 100%;
			height: 100%;
			position: absolute;
			z-index: -1;
			transform: translateZ(-50px) scale(2.4);
		}
		
		.list-item:hover .item-image::before {
			background-color: rgba(0,0,0,0.2);
		}
		
		.item-image::before {
			content: "";
			display: block;
			position: absolute;
			width: 100%;
			height: 100%;
			background-color: rgba(0,0,0,0.4);
			transition: all 0.3s ease;
		}
		
		.item-image img {
			display: block;
			width: 100%;
			height: 100%;
			object-fit: cover;
		}
		
		.item-text {
			color: #fff;
			font-family: "微软雅黑";
			text-align: center;
		}
		
		.text-title {
			font-size: 2rem;
			font-weight: bolder;
			margin-bottom: 20px;
		}
		
		.text-desc {
			font-size: 1.2rem;
		}
		
		a {
			text-decoration: none;
		}
		
	</style>
</head>
<body>
	<main class="main">
		<a href="/img">
			<section class="list-item">
				<div class="item-image">
					<img src="http://hello_world-2233.gitee.io/images/index_images/1.jpg"/>
				</div>
				<div class="item-text">
					<div class="text-title">图片库</div>
					<div class="text-desc">图片来自 哔哩哔哩，大约有 5000 多张，不再更新，存放的是链接，源码可见。</div>
				</div>
			</section>
		</a>
		<a href="/miku">
			<section class="list-item">
				<div class="item-image">
					<img src="http://hello_world-2233.gitee.io/images/index_images/2.jpg"/>
				</div>
				<div class="item-text">
					<div class="text-title">miku图片</div>
					<div class="text-desc">图片来自 哔哩哔哩，大约有 2000 多张，不再更新，存放的是链接，源码可见。</div>
				</div>
			</section>
		</a>
		
		<a href="#">
			<section class="list-item">
				<div class="item-image">
					<img src="http://hello_world-2233.gitee.io/images/index_images/3.jpg"/>
				</div>
				<div class="item-text">
					<div class="text-title">1</div>
					<div class="text-desc">1</div>
				</div>
			</section>
		</a>
		
		<a href="#">
			<section class="list-item">
				<div class="item-image">
					<img src="/index_images/10.jpg"/>
				</div>
				<div class="item-text">
					<div class="text-title"></div>
					<div class="text-desc"></div>
				</div>
			</section>
		</a>
		
	</main>
</body>
</html>
